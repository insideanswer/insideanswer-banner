<style>

  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body {
    font-family:'Noto Sans KR','Apple SD Gothic Neo','맑은 고딕',Malgun Gothic,sans-serif;

  .card {
    width:100%; height:100%; min-height:280px;

  .glow-b { width:260px; height:260px; left:-60px; bottom:-100px;

  .headline { color:#f5f3ff; }
  .accent { background:linear-gradient(90deg,#818cf8,#c084fc);

  .sub { color:#a5a0c8; }
  .btn { background:#ffffff; color:#2e1065; box-shadow:0 6px 18px rgba(99,60,200,0.45); }

  .content {
    -webkit-flex:1; flex:1; z-index:1; padding-right:20px;
    display:-webkit-flex; display:flex; -webkit-flex-direction:column; flex-direction:column;
    -webkit-justify-content:center; justify-content:center;
  }
  .tag {
    font-size:11px; font-weight:700; letter-spacing:0.14em;
    text-transform:uppercase; margin-bottom:14px;
    display:inline-block; padding:4px 12px; border-radius:100px;
    width:-webkit-fit-content; width:fit-content;
  }
  .headline { font-size:38px; font-weight:900; line-height:1.22; letter-spacing:-0.02em; margin-bottom:8px; }
  .accent { display:block; }
  .sub { font-size:15px; font-weight:400; margin-bottom:28px; }
  .btn {
    display:-webkit-inline-flex; display:inline-flex;
    -webkit-align-items:center; align-items:center; gap:8px;
    padding:13px 26px; border-radius:10px;
    font-size:14px; font-weight:700;
    font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;
    cursor:pointer; text-decoration:none; border:none;
    width:-webkit-fit-content; width:fit-content;
    -webkit-transition:all 0.2s ease; transition:all 0.2s ease;
  }
  .btn .arrow { -webkit-transition:-webkit-transform 0.2s ease; transition:transform 0.2s ease; font-style:normal; }
  .btn:hover { -webkit-transform:translateY(-3px); transform:translateY(-3px); }
  .btn:hover .arrow { -webkit-transform:translateX(4px); transform:translateX(4px); }
  .logo-area {
    -webkit-flex-shrink:0; flex-shrink:0;
    display:-webkit-flex; display:flex;
    -webkit-align-items:center; align-items:center;
    -webkit-justify-content:center; justify-content:center;
    z-index:1; width:280px;
  }
  .logo-area img { display:block; width:100%; height:auto; max-height:170px; object-fit:contain; }
  @media (max-width:640px) {
    .card { -webkit-flex-direction:column; flex-direction:column; padding:32px 26px; min-height:0; }
    .content { padding-right:0; }
    .tag { margin-bottom:10px; }
    .headline { font-size:26px; margin-bottom:6px; }
    .sub { font-size:13px; margin-bottom:18px; }
    .logo-area { width:100%; margin-top:18px; -webkit-justify-content:flex-start; justify-content:flex-start; }
    .logo-area img { max-height:52px; }
  }
