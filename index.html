<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InsideAnswer Banners</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR','Apple SD Gothic Neo','맑은 고딕',Malgun Gothic,sans-serif;
    background: transparent;
    display: flex; flex-direction: column; gap: 24px;
    padding: 16px; align-items: center;
  }
  .card {
    width: 100%; max-width: 900px; min-height: 300px;
    border-radius: 24px; padding: 46px 52px;
    display: -webkit-flex; display: flex;
    -webkit-align-items: stretch; align-items: stretch;
    position: relative; overflow: hidden;
  }

  /* CARD 1 — HuntDesk 블루 톤 */
  .card-1 {
    background: #1e3a8a;
    background: linear-gradient(135deg, #eaf2ff 0%, #cfe0fc 50%, #aecbf7 100%);
  }
  /* CARD 2 — InsideAnswer 딥 인디고/퍼플 (컬러풀) */
  .card-2 {
    background: #2e1065;
    background: linear-gradient(135deg, #2a1a5e 0%, #1e1b4b 45%, #14143a 100%);
  }

  .glow { position:absolute; border-radius:50%; pointer-events:none; }
  .card-1 .glow-a { width:340px; height:340px; right:-90px; top:-90px;
    background:radial-gradient(circle, rgba(29,124,254,0.2) 0%, transparent 70%); }
  .card-2 .glow-a { width:380px; height:380px; right:-100px; top:-120px;
    background:radial-gradient(circle, rgba(139,92,246,0.32) 0%, transparent 70%); }
  .card-2 .glow-b { width:260px; height:260px; left:-60px; bottom:-100px;
    background:radial-gradient(circle, rgba(59,130,246,0.22) 0%, transparent 70%); }

  .content {
    -webkit-flex: 1; flex: 1; z-index: 1; padding-right: 20px;
    display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column;
    -webkit-justify-content: center; justify-content: center;
  }

  .tag {
    font-size:11px; font-weight:700; letter-spacing:0.14em;
    text-transform:uppercase; margin-bottom:14px;
    display:inline-block; padding:4px 12px; border-radius:100px;
    width:-webkit-fit-content; width:fit-content;
  }
  .card-1 .tag { background:rgba(29,124,254,0.14); color:#1565d8; }
  .card-2 .tag { background:rgba(167,139,250,0.18); color:#c4b5fd; }

  .headline {
    font-size:38px; font-weight:900; line-height:1.22;
    letter-spacing:-0.02em; margin-bottom:8px;
  }
  .card-1 .headline { color:#0d2a5e; }
  .card-2 .headline { color:#f5f3ff; }
  .accent { display:block; }
  .card-1 .accent { color:#1d7cfe; }
  .card-2 .accent {
    background: linear-gradient(90deg, #818cf8, #c084fc);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .sub { font-size:15px; font-weight:400; margin-bottom:28px; }
  .card-1 .sub { color:#3b5b91; }
  .card-2 .sub { color:#a5a0c8; }

  .btn {
    display:-webkit-inline-flex; display:inline-flex;
    -webkit-align-items:center; align-items:center; gap:8px;
    padding:13px 26px; border-radius:10px;
    font-size:14px; font-weight:700;
    font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;
    cursor:pointer; text-decoration:none; border:none;
    width:-webkit-fit-content; width:fit-content;
    -webkit-transition:all 0.2s ease; transition:all 0.2s ease;
  }
  .btn .arrow { -webkit-transition:-webkit-transform 0.2s ease; transition:transform 0.2s ease; font-style:normal; }
  .btn:hover { -webkit-transform:translateY(-3px); transform:translateY(-3px); }
  .btn:hover .arrow { -webkit-transform:translateX(4px); transform:translateX(4px); }
  .card-1 .btn { background:#1d7cfe; color:#fff; box-shadow:0 6px 18px rgba(29,124,254,0.4); }
  .card-1 .btn:hover { box-shadow:0 10px 28px rgba(29,124,254,0.55); }
  .card-2 .btn { background:#ffffff; color:#2e1065; box-shadow:0 6px 18px rgba(99,60,200,0.45); }
  .card-2 .btn:hover { box-shadow:0 10px 28px rgba(139,92,246,0.6); }

  /* 로고 — 오른쪽, 콘텐츠 높이만큼 크게 */
  .logo-area {
    -webkit-flex-shrink: 0; flex-shrink: 0;
    display: -webkit-flex; display: flex;
    -webkit-align-items: center; align-items: center;
    -webkit-justify-content: center; justify-content: center;
    z-index: 1; width: 280px;
  }
  .logo-area img { display:block; width:100%; height:auto; max-height:170px; object-fit:contain; }

  @media (max-width: 640px) {
    .card { -webkit-flex-direction: column; flex-direction: column; }
    .headline { font-size: 30px; }
    .logo-area { width: 100%; margin-top: 28px; }
    .logo-area img { max-height: 90px; }
  }
</style>
</head>
